name: Publish

on:
  # Kept as a manual fallback only.
  # The `Release` workflow publishes inline, so no `release: published` trigger here
  # (it would cause a duplicate deploy and fail with 409 on immutable release versions).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build with Maven
        run: mvn -B -DskipTests package --file pom.xml
        env:
          RHESIS_API_KEY: ${{ secrets.RHESIS_API_KEY }}
          RHESIS_BASE_URL: ${{ secrets.RHESIS_BASE_URL }}

      - name: Publish to GitHub Packages
        run: mvn -B -DskipTests deploy --file pom.xml
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
